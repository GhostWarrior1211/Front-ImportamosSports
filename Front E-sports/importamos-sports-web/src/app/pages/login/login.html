<div class="login-page">
  <div class="login-overlay"></div>

  <div class="login-content">
    <div class="top-banner">
      <h1>Bienvenido a Importamos Sports</h1>
      <p>Gestiona productos, pedidos y compras desde una sola plataforma.</p>
    </div>

    <div class="login-wrapper">
      <div class="login-card">
        <div class="login-header">
          <div class="logo-box">
            <img src="/img/login/logo.png" alt="Logo" class="login-logo" />
          </div>
        </div>

        <div class="login-body">
          <div class="mb-3">
            <label class="form-label">Correo</label>
            <input
              type="email"
              class="form-control custom-input"
              [(ngModel)]="correo"
              placeholder="Ingresa tu correo" />
          </div>

          <div class="mb-3">
            <label class="form-label">Contraseña</label>

            <div class="password-box">
              <input
                [type]="mostrarClave ? 'text' : 'password'"
                class="form-control custom-input pe-5"
                [(ngModel)]="clave"
                placeholder="Ingresa tu contraseña" />

              <button
                type="button"
                class="toggle-password"
                (click)="mostrarClave = !mostrarClave"
                [attr.aria-label]="mostrarClave ? 'Ocultar contraseña' : 'Mostrar contraseña'">

                <svg *ngIf="!mostrarClave" xmlns="http://www.w3.org/2000/svg" width="22" height="22" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                  <path stroke-linecap="round" stroke-linejoin="round"
                    d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7Z" />
                  <circle cx="12" cy="12" r="3" />
                </svg>

                <svg *ngIf="mostrarClave" xmlns="http://www.w3.org/2000/svg" width="22" height="22" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                  <path stroke-linecap="round" stroke-linejoin="round"
                    d="M3 3l18 18" />
                  <path stroke-linecap="round" stroke-linejoin="round"
                    d="M10.584 10.587A2 2 0 0 0 12 16a2 2 0 0 0 1.414-.586" />
                  <path stroke-linecap="round" stroke-linejoin="round"
                    d="M9.363 5.365A9.466 9.466 0 0 1 12 5c4.478 0 8.268 2.943 9.542 7a9.97 9.97 0 0 1-4.032 5.063M6.228 6.228A9.965 9.965 0 0 0 2.458 12c1.274 4.057 5.064 7 9.542 7a9.47 9.47 0 0 0 3.121-.525" />
                </svg>
              </button>
            </div>
          </div>

          <div class="login-options mb-3">
            <label class="remember-box">
              <input type="checkbox" [(ngModel)]="recordarme" />
              <span>Recordarme</span>
            </label>
          </div>

          <button
            class="btn btn-success login-btn w-100 d-flex align-items-center justify-content-center gap-2"
            [disabled]="cargando"
            (click)="iniciarSesion()">

            <span
              *ngIf="cargando"
              class="spinner-border spinner-border-sm"
              role="status"
              aria-hidden="true">
            </span>

            <span>{{ cargando ? 'Ingresando...' : 'Iniciar sesión' }}</span>
          </button>

          <div class="login-footer">
            <span>¿No tienes cuenta?</span>
            <a routerLink="/registro">Regístrate</a>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
